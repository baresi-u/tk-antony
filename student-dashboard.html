<!DOCTYPE html>
<html><head><title>Dashboard Siswa</title><style>
body{margin:0;font-family:Arial;background:#f5f6fa;color:#222}.side{width:220px;height:100vh;background:#1e2a4a;color:white;position:fixed;padding:20px}.main{margin-left:260px;padding:30px}.card{background:white;padding:20px;border-radius:15px;margin:15px 0;box-shadow:0 5px 20px #0001}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}button{background:#1e2a4a;color:white;border:0;padding:10px;border-radius:8px}</style></head>
<body><div class="side"><h2>Siswa</h2>Dashboard<br>Absensi<br>Tugas Saya<br>Upload Tugas<br>Event<br>Berita<br>Profil</div>
<div class="main"><h1>Selamat Datang Siswa</h1>
<div class="grid"><div class="card">📅<h3>Kehadiran</h3>95%</div><div class="card">📚<h3>Tugas Aktif</h3>3</div><div class="card">🎉<h3>Event</h3>2</div></div>
<div class="card"><h2>📚 Tugas Baru</h2><p>Matematika - Latihan halaman 20</p><button>Download</button><br><br><input type="file"><button>Upload Jawaban</button><p>Status: 🟡 Belum selesai</p></div>
<div class="card"><h2>📰 Berita Sekolah</h2><p>Informasi terbaru sekolah tampil disini.</p></div>
</div></body></html>

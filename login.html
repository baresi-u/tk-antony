<!DOCTYPE html>
<html><head><title>Login Portal</title><style>
body{font-family:Arial;background:#f6f1e8;height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#fff;padding:35px;border-radius:20px;width:360px;box-shadow:0 10px 30px #0002}
input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px}
button{background:#1e2a4a;color:#fff;border:0}
</style></head><body><div class="box">
<h2>KB TK Mary Anthony</h2><h3>Login</h3>
<input placeholder="Email">
<input type="password" placeholder="Password">
<button onclick="login()">Masuk</button>
<p style="font-size:13px">Demo akun:<br>admin@tk.com<br>guru@tk.com<br>siswa@tk.com</p>
</div>
<script>
function login(){
let e=document.querySelectorAll('input')[0].value;
if(e.includes('admin'))location='admin-dashboard.html';
else if(e.includes('guru'))location='teacher-dashboard.html';
else if(e.includes('siswa'))location='student-dashboard.html';
else alert('Email tidak terdaftar');
}
</script></body></html>

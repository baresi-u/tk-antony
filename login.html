<!DOCTYPE html>
<html>
<head>
<title>Login KB TK Mary Anthony</title>
<style>
body{font-family:Arial;background:#f5f1e8;display:flex;height:100vh;align-items:center;justify-content:center}
.box{background:white;padding:35px;border-radius:20px;width:360px;box-shadow:0 5px 20px #0002}
input,button{width:100%;padding:13px;margin:8px 0;border-radius:10px}
button{background:#1e2a4a;color:white;border:0}
</style>
</head>
<body>
<div class="box">
<h2>Login Portal</h2>
<input id="email" placeholder="Email">
<input id="pass" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<script>
function login(){
let e=document.getElementById('email').value.toLowerCase();

if(e.includes('admin')){
location.href='admin-dashboard.html';
}
else if(e.includes('guru')){
location.href='teacher-dashboard.html';
}
else if(e.includes('siswa')){
location.href='student-dashboard.html';
}
else{
alert('Email tidak ditemukan');
}
}
</script>
</body>
</html>

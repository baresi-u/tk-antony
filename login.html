<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Login</title>
<style>body{font-family:Arial;background:#f7f1e7;height:100vh;display:flex;align-items:center;justify-content:center}.box{background:white;padding:35px;border-radius:20px;width:360px;box-shadow:0 5px 20px #0002}input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px}button{background:#1e2a4a;color:white;border:0}</style></head>
<body><div class="box"><h2>Login Portal Sekolah</h2><input id="email" placeholder="Email"><input id="pass" type="password" placeholder="Password"><button onclick="login()">Masuk</button></div>
<script>
function login(){let e=document.getElementById('email').value.toLowerCase();if(e.includes('admin'))location='admin-dashboard.html';else if(e.includes('guru'))location='teacher-dashboard.html';else if(e.includes('siswa'))location='student-dashboard.html';else alert('Email tidak dikenali')}
</script></body></html>
